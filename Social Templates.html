<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LOEN LULLABY — Social Templates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --sand:        #EFE6D3;
    --sand-deep:   #E3D7BD;
    --cream:       #F7F0DF;
    --ink:         #1E2528;
    --ink-soft:    #3A4144;
    --accent:      #C97A4B;
    --accent-deep: #A55E33;
    --water:       #2F6B73;
    --water-deep:  #1F4F56;
    --rule:        rgba(30,37,40,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#E8E0CC}
  body{
    font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .display{font-family:'Italiana',serif;font-weight:400;letter-spacing:.005em}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase}

  /* Image-slot baseline — matches main site */
  image-slot{ background:rgba(30,37,40,.04); }
  image-slot::part(frame){
    background:
      repeating-linear-gradient(135deg,
        rgba(30,37,40,.03) 0 16px,
        rgba(30,37,40,0) 16px 32px),
      var(--cream);
  }
  image-slot::part(ring){ border:1px dashed rgba(30,37,40,.20); }
  image-slot::part(caption){
    font-family:'JetBrains Mono',ui-monospace,monospace !important;
    letter-spacing:.16em !important;
    text-transform:uppercase !important;
    font-size:11px !important;
  }

  /* Tiny atoms */
  .eyebrow{
    display:inline-flex;align-items:center;gap:14px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;
  }
  .eyebrow::before{
    content:"";display:inline-block;width:36px;height:1px;
    background:currentColor;opacity:.55;
  }
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent)}

  /* ── Templates ─────────────────────────────────────────────────────── */

  /* SQUARE — Announcement */
  .tpl-sq-announcement{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:var(--ink);color:var(--cream);
  }
  .tpl-sq-announcement .slot{ position:absolute;inset:0; }
  .tpl-sq-announcement .veil{
    position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,
      rgba(30,37,40,.40) 0%,
      rgba(30,37,40,0) 26%,
      rgba(30,37,40,0) 48%,
      rgba(30,37,40,.78) 100%);
  }
  .tpl-sq-announcement .top{
    position:absolute;top:64px;left:72px;right:72px;
    display:flex;align-items:center;justify-content:space-between;color:var(--cream);
    font-size:16px;
  }
  .tpl-sq-announcement .bot{
    position:absolute;left:72px;right:72px;bottom:72px;color:var(--cream);
  }
  .tpl-sq-announcement h1{
    font-family:'Italiana',serif;font-weight:400;
    font-size:168px;line-height:.9;letter-spacing:-.01em;margin:0;
  }
  .tpl-sq-announcement .meta{
    margin-top:36px;display:flex;align-items:flex-end;justify-content:space-between;gap:40px;
  }
  .tpl-sq-announcement .meta p{
    margin:0;max-width:520px;font-size:22px;line-height:1.5;
    color:rgba(247,240,223,.92);
  }

  /* SQUARE — Editorial split */
  .tpl-sq-editorial{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:var(--sand);color:var(--ink);
    display:grid;grid-template-columns:1fr 1fr;
  }
  .tpl-sq-editorial .slot{ position:relative;width:100%;height:100%; }
  .tpl-sq-editorial .panel{
    padding:80px 72px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .tpl-sq-editorial .panel .eyebrow{font-size:14px;color:var(--ink-soft)}
  .tpl-sq-editorial h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:108px;line-height:.94;letter-spacing:-.005em;margin:0;
    text-wrap:balance;
  }
  .tpl-sq-editorial .body{ font-size:21px;line-height:1.55;color:var(--ink-soft);max-width:380px;margin:0; }
  .tpl-sq-editorial .footline{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--rule);padding-top:22px;color:var(--ink-soft);
  }

  /* SQUARE — Typographic quote */
  .tpl-sq-quote{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:var(--cream);color:var(--ink);
    padding:96px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .tpl-sq-quote .quote{
    font-family:'Italiana',serif;font-weight:400;
    font-size:108px;line-height:1;letter-spacing:-.005em;margin:0;
    text-wrap:balance;
  }
  .tpl-sq-quote .quote em{ color:var(--accent);font-style:italic; }
  .tpl-sq-quote .head{
    display:flex;justify-content:space-between;align-items:flex-start;
    font-size:14px;color:var(--ink-soft);
  }
  .tpl-sq-quote .foot{
    display:flex;justify-content:space-between;align-items:flex-end;gap:40px;
    font-size:14px;color:var(--ink-soft);
  }
  .tpl-sq-quote .foot .attr{
    font-family:'Italiana',serif;font-size:22px;letter-spacing:.01em;color:var(--ink);
    text-transform:none;
  }

  /* STORY — Hero */
  .tpl-st-hero{
    width:1080px;height:1920px;position:relative;overflow:hidden;
    background:var(--ink);color:var(--cream);
  }
  .tpl-st-hero .slot{ position:absolute;inset:0; }
  .tpl-st-hero .veil{
    position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,
      rgba(30,37,40,.55) 0%,
      rgba(30,37,40,0) 20%,
      rgba(30,37,40,0) 50%,
      rgba(30,37,40,.82) 100%);
  }
  .tpl-st-hero .top{
    position:absolute;top:130px;left:80px;right:80px;
    display:flex;justify-content:space-between;align-items:center;color:var(--cream);
    font-size:18px;
  }
  .tpl-st-hero .bot{
    position:absolute;left:80px;right:80px;bottom:170px;color:var(--cream);
  }
  .tpl-st-hero h1{
    font-family:'Italiana',serif;font-weight:400;
    font-size:200px;line-height:.88;letter-spacing:-.01em;margin:0;
  }
  .tpl-st-hero .sub{
    margin-top:40px;font-size:26px;line-height:1.45;color:rgba(247,240,223,.92);max-width:760px;
  }
  .tpl-st-hero .swipe{
    position:absolute;left:0;right:0;bottom:72px;
    display:flex;justify-content:center;align-items:center;gap:14px;
    font-size:14px;color:rgba(247,240,223,.78);
  }

  /* STORY — Detail card */
  .tpl-st-detail{
    width:1080px;height:1920px;position:relative;overflow:hidden;
    background:var(--sand);color:var(--ink);
    display:grid;grid-template-rows:1fr 1.05fr;
  }
  .tpl-st-detail .top{
    padding:96px 80px 56px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .tpl-st-detail .top .head{
    display:flex;justify-content:space-between;align-items:center;
    font-size:18px;color:var(--ink-soft);
  }
  .tpl-st-detail h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:160px;line-height:.92;letter-spacing:-.01em;margin:0 0 36px;
    text-wrap:balance;
  }
  .tpl-st-detail .specs{
    display:grid;grid-template-columns:repeat(3,1fr);gap:24px;
    border-top:1px solid var(--rule);padding-top:32px;
  }
  .tpl-st-detail .specs .k{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
    margin-bottom:8px;
  }
  .tpl-st-detail .specs .v{
    font-family:'Italiana',serif;font-size:42px;line-height:1;color:var(--ink);
  }
  .tpl-st-detail .slot{ position:relative;width:100%;height:100%; }

  /* PORTRAIT — Listing */
  .tpl-pt-listing{
    width:1080px;height:1350px;position:relative;overflow:hidden;
    background:var(--sand);color:var(--ink);
    display:grid;grid-template-rows:880px 1fr;
  }
  .tpl-pt-listing .slot{ position:relative;width:100%;height:100%; }
  .tpl-pt-listing .panel{
    padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .tpl-pt-listing .row1{ display:flex;justify-content:space-between;align-items:flex-start;gap:28px; }
  .tpl-pt-listing h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:88px;line-height:.92;letter-spacing:-.005em;margin:0;
  }
  .tpl-pt-listing .badge{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--cream);background:var(--ink);
    padding:10px 16px;border-radius:999px;white-space:nowrap;
    display:inline-flex;align-items:center;gap:10px;
  }
  .tpl-pt-listing .row2{
    display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
    border-top:1px solid var(--rule);padding-top:24px;margin-top:24px;
  }
  .tpl-pt-listing .row2 .k{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
    margin-bottom:6px;
  }
  .tpl-pt-listing .row2 .v{
    font-family:'Italiana',serif;font-size:30px;line-height:1;color:var(--ink);
  }

  /* PORTRAIT — Editorial postcard */
  .tpl-pt-postcard{
    width:1080px;height:1350px;position:relative;overflow:hidden;
    background:var(--cream);color:var(--ink);
    padding:80px 72px;display:flex;flex-direction:column;gap:48px;
  }
  .tpl-pt-postcard .head{
    display:flex;justify-content:space-between;align-items:center;color:var(--ink-soft);
    font-size:14px;
  }
  .tpl-pt-postcard h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:128px;line-height:.92;letter-spacing:-.008em;margin:0;
    text-wrap:balance;
  }
  .tpl-pt-postcard .slot{ flex:1;min-height:0;position:relative;width:100%; }
  .tpl-pt-postcard .foot{
    display:grid;grid-template-columns:1.5fr 1fr;gap:36px;align-items:end;
    border-top:1px solid var(--rule);padding-top:28px;
  }
  .tpl-pt-postcard .foot p{
    margin:0;font-size:20px;line-height:1.55;color:var(--ink-soft);max-width:520px;
  }
  .tpl-pt-postcard .foot .sig{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
    text-align:right;
  }
  .tpl-pt-postcard .foot .sig .big{
    font-family:'Italiana',serif;font-size:32px;letter-spacing:.01em;
    text-transform:none;color:var(--ink);display:block;margin-bottom:6px;
  }

  /* ── CAROUSELS · 9:16 (1080×1920) ──────────────────────────────────── */

  /* Shared frame — every carousel slide uses .car for chrome */
  .car{
    width:1080px;height:1920px;position:relative;overflow:hidden;
    color:var(--ink);
  }
  .car .chrome{
    position:absolute;top:80px;left:80px;right:80px;z-index:3;
    display:flex;justify-content:space-between;align-items:center;
    font-size:16px;
  }
  .car .pager{
    display:inline-flex;align-items:center;gap:10px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.16em;text-transform:uppercase;font-size:14px;
  }
  .car .pager .pg-dots{
    display:inline-flex;gap:6px;margin-left:14px;
  }
  .car .pager .pg-dots i{
    width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.32;
  }
  .car .pager .pg-dots i.on{ opacity:1; }
  .car .swipe{
    position:absolute;left:0;right:0;bottom:90px;z-index:4;
    display:flex;justify-content:center;align-items:center;gap:14px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;font-size:13px;
    opacity:.82;
  }
  .car.dark{ background:var(--ink);color:var(--cream); }
  .car.sand{ background:var(--sand); }
  .car.cream{ background:var(--cream); }
  .car .slot-full{ position:absolute;inset:0;z-index:1; }
  .car .veil-bottom{
    position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,
      rgba(30,37,40,.45) 0%,
      rgba(30,37,40,0) 22%,
      rgba(30,37,40,0) 48%,
      rgba(30,37,40,.82) 100%);
  }
  .car .body{ position:absolute;left:80px;right:80px;bottom:200px;z-index:3; }
  .car h1.title{
    font-family:'Italiana',serif;font-weight:400;
    font-size:188px;line-height:.88;letter-spacing:-.01em;margin:0;
  }
  .car h1.title.lg{ font-size:218px; }
  .car h1.title.md{ font-size:148px; }
  .car .sub{
    margin-top:34px;font-size:26px;line-height:1.45;max-width:820px;
    color:inherit;opacity:.92;
  }
  .car .eyebrow-line{
    display:inline-flex;align-items:center;gap:14px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;font-size:15px;
  }
  .car .eyebrow-line::before{
    content:"";display:inline-block;width:36px;height:1px;
    background:currentColor;opacity:.55;
  }

  /* Stat-card slide */
  .car.stat .stat-wrap{
    position:absolute;inset:0;padding:80px 80px 190px;z-index:3;
    pointer-events:none;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .car.stat .big-num{
    font-family:'Italiana',serif;font-weight:400;
    font-size:520px;line-height:.84;letter-spacing:-.02em;
    color:var(--accent);
  }
  .car.stat .big-num.small{ font-size:380px; }
  .car.stat .label{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;font-size:18px;
    color:var(--ink-soft);margin-bottom:18px;
  }
  .car.stat .cap{
    font-size:24px;line-height:1.5;max-width:760px;color:var(--ink-soft);
  }

  /* Split image+text slide */
  .car.split{ display:grid;grid-template-rows:1fr 1fr; }
  .car.split .slot-half{ position:relative;width:100%;height:100%; }
  .car.split .panel{
    padding:80px 80px 190px;display:flex;flex-direction:column;justify-content:space-between;
  }
  .car.split h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:132px;line-height:.92;letter-spacing:-.008em;margin:0;
    text-wrap:balance;
  }
  .car.split .panel p{
    margin:0;font-size:24px;line-height:1.5;color:var(--ink-soft);max-width:760px;
  }

  /* List slide (e.g. "What's nearby") */
  .car.list .list-wrap{
    position:absolute;inset:0;padding:80px 80px 190px;z-index:3;
    pointer-events:none;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .car.list h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:148px;line-height:.92;letter-spacing:-.01em;margin:0;
    text-wrap:balance;
  }
  .car.list .rows{ display:flex;flex-direction:column; }
  .car.list .row{
    border-top:1px solid var(--rule);
    padding:32px 0;
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:baseline;
  }
  .car.list .row:last-child{ border-bottom:1px solid var(--rule); }
  .car.list .row .k{
    font-family:'Italiana',serif;font-size:48px;line-height:1;color:var(--ink);
  }
  .car.list .row .v{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
  }

  /* Timeline slide */
  .car.timeline .tl-wrap{
    position:absolute;inset:0;padding:80px 80px 190px;z-index:3;
    pointer-events:none;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .car.timeline h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:128px;line-height:.92;letter-spacing:-.008em;margin:0;
  }
  .car.timeline .tl{
    display:grid;grid-template-columns:1fr;gap:0;margin-top:40px;
  }
  .car.timeline .item{
    display:grid;grid-template-columns:140px 1fr;gap:32px;
    padding:36px 0;border-top:1px solid var(--rule);align-items:baseline;
  }
  .car.timeline .item:last-child{ border-bottom:1px solid var(--rule); }
  .car.timeline .item .yr{
    font-family:'Italiana',serif;font-size:64px;line-height:1;color:var(--accent);
  }
  .car.timeline .item .place{
    font-family:'Italiana',serif;font-size:44px;line-height:1.05;color:var(--ink);
  }
  .car.timeline .item .place small{
    display:block;font-family:'DM Sans',sans-serif;font-size:18px;
    color:var(--ink-soft);margin-top:8px;letter-spacing:0;text-transform:none;
  }

  /* CTA slide */
  .car.cta .cta-wrap{
    position:absolute;inset:0;padding:80px;z-index:3;
    pointer-events:none;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .car.cta h2{
    font-family:'Italiana',serif;font-weight:400;
    font-size:188px;line-height:.9;letter-spacing:-.01em;margin:0;
  }
  .car.cta .url{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;font-size:22px;
  }
  .car.cta .pill{
    display:inline-flex;align-items:center;gap:14px;
    padding:24px 32px;border-radius:999px;
    background:var(--accent);color:var(--cream);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:18px;letter-spacing:.18em;text-transform:uppercase;
    align-self:flex-start;
  }
  .car.cta .pill .arrow{
    width:14px;height:14px;border-top:2px solid currentColor;
    border-right:2px solid currentColor;transform:rotate(45deg);display:inline-block;
  }

  /* ── Background image-slots (every carousel slide) ──────────────────
     Empty state: transparent, so the slide's brand color shows through.
     Filled state: image visible + auto-scrim for text legibility. */
  .car image-slot.slot-bg,
  .car image-slot.slot-full,
  .car image-slot.slot-half{
    background:transparent !important;
    display:block !important;
    width:100% !important;
    height:100% !important;
  }
  .car image-slot.slot-bg::part(frame),
  .car image-slot.slot-full::part(frame),
  .car image-slot.slot-half::part(frame){
    background:transparent;
  }
  .car image-slot.slot-bg::part(ring),
  .car image-slot.slot-full::part(ring),
  .car image-slot.slot-half::part(ring){
    border:0;
    box-shadow:none;
  }
  /* Hide the centered placeholder block entirely — keep the surface clean. */
  .car image-slot.slot-bg::part(empty),
  .car image-slot.slot-full::part(empty),
  .car image-slot.slot-half::part(empty){
    opacity:0;
  }
  /* Subtle "+ photo" corner hint, visible on hover only. */
  .car image-slot.slot-bg::part(frame):hover,
  .car image-slot.slot-full::part(frame):hover,
  .car image-slot.slot-half::part(frame):hover{
    outline:1px dashed rgba(30,37,40,.22);
    outline-offset:-12px;
  }
  .car.dark image-slot.slot-bg::part(frame):hover,
  .car.dark image-slot.slot-full::part(frame):hover{
    outline-color:rgba(247,240,223,.30);
  }

  /* Always-visible upload affordance on empty slides — small mono pill in the
     bottom-right that goes away as soon as an image is dropped. */
  .car .upload-hint{
    position:absolute;right:80px;bottom:90px;z-index:4;
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 14px;border-radius:999px;
    border:1px dashed rgba(30,37,40,.28);
    background:rgba(247,240,223,.55);
    color:var(--ink-soft);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    pointer-events:none;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    transition:opacity .25s ease;
  }
  .car.dark .upload-hint{
    border-color:rgba(247,240,223,.30);
    background:rgba(30,37,40,.45);
    color:rgba(247,240,223,.78);
  }
  .car .upload-hint::before{
    content:"";display:inline-block;width:10px;height:10px;
    border-radius:50%;border:1px dashed currentColor;
  }
  /* Hide the hint as soon as the slide's backdrop slot has an image. */
  .car:has(image-slot.slot-bg[data-filled]) .upload-hint,
  .car:has(image-slot.slot-full[data-filled]) .upload-hint,
  .car:has(image-slot.slot-half[data-filled]) .upload-hint{
    opacity:0;
  }
  /* On split slides the slot is the TOP half — anchor the hint there. */

    // Tiny helper to render an image-slot with the brand placeholder treatment.
    function Slot({ id, placeholder, className }) {
      return (
        <image-slot
          id={id}
          class={className || 'slot'}
          shape="rect"
          placeholder={placeholder}
        ></image-slot>
      );
    }

    // ── Carousel atoms ─────────────────────────────────────────────────
    // Pager dots ("01 / 05" + dots) for any carousel slide.
    function Pager({ n, total }) {
      const dots = [];
      for (let i = 1; i <= total; i++) dots.push(
        <i key={i} className={i === n ? 'on' : ''} />
      );
      return (
        <span className="pager">
          <span>Nº {String(n).padStart(2,'0')} / {String(total).padStart(2,'0')}</span>
          <span className="pg-dots">{dots}</span>
        </span>
      );
    }

    // Top-bar chrome shared by every carousel slide.
    function CarChrome({ n, total, brand = 'LOEN LULLABY' }) {
      return (
        <div className="chrome">
          <span className="mono" style={{ fontSize: 14 }}>{brand}</span>
          <Pager n={n} total={total} />
        </div>
      );
    }

    function Swipe({ children = '↑ Swipe', style }) {
      return <div className="swipe" style={style}>{children}</div>;
    }

    // Background image-slot for any carousel slide. Empty = slide color,
    // filled = image with an auto-tinted veil for legibility.
    function CarBg({ id, placeholder }) {
      return (
        <React.Fragment>
          <image-slot
            id={id}
            class="slot-bg"
            shape="rect"
            placeholder={placeholder || 'Drop a backdrop'}
          ></image-slot>
          <div className="veil-auto" />
          <div className="upload-hint">Drop image</div>
        </React.Fragment>
      );
    }

    // Standalone hint for slides that bring their own image-slot (covers).
    function UploadHint() {
      return <div className="upload-hint">Drop image</div>;
    }

    // ── Video slot ─────────────────────────────────────────────────────
    // In-memory drag-drop video player. Persists across the session via the
    // <video src>'s blob URL; lost on reload (videos are too large for the
    // sidecar JSON the image-slot uses).
    function VideoSlot({ id, label }) {
      const [src, setSrc] = React.useState(null);
      const [drag, setDrag] = React.useState(false);
      const inputRef = React.useRef(null);
      const slotRef = React.useRef(null);

      const accept = (file) => {
        if (!file || !file.type.startsWith('video/')) return;
        if (src) URL.revokeObjectURL(src);
        setSrc(URL.createObjectURL(file));
      };
      const onDrop = (e) => {
        e.preventDefault(); setDrag(false);
        accept(e.dataTransfer?.files?.[0]);
      };
      const onPick = (e) => accept(e.target.files?.[0]);
      const onClear = (e) => {
        e.stopPropagation();
        if (src) URL.revokeObjectURL(src);
        setSrc(null);
      };
      const onReplace = (e) => {
        e.stopPropagation();
        inputRef.current?.click();
      };

      return (
        <React.Fragment>
          <div
            ref={slotRef}
            className="vid-slot"
            data-filled={src ? '' : undefined}
            onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={onDrop}
          >
            {src ? (
              <video src={src} autoPlay muted loop playsInline />
            ) : null}
          </div>

          {!src ? (
            <div
              className={'vid-empty' + (drag ? ' drag' : '')}
              onClick={() => inputRef.current?.click()}
              onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
              onDragLeave={() => setDrag(false)}
              onDrop={onDrop}
            >
              <span className="glyph">▶</span>
              <span className="label">{label || 'Drop a video'}</span>
              <span className="sub">MP4 · WEBM · MOV</span>
            </div>
          ) : null}

          <div className="vid-veil" />

          {src ? (
            <div className="vid-controls">
              <button onClick={onReplace}>Replace</button>
              <button onClick={onClear}>Remove</button>
            </div>
          ) : null}

          <input
            ref={inputRef}
            type="file"
            accept="video/*"
            style={{ display: 'none' }}
            onChange={onPick}
          />
        </React.Fragment>
      );
    }
