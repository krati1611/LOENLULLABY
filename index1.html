<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LOEN LULLABY — North Beach, Miami Beach</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --sand:        #EFE6D3;
    --sand-deep:   #E3D7BD;
    --cream:       #F7F0DF;
    --ink:         #1E2528;
    --ink-soft:    #3A4144;
    --accent:      #C97A4B;
    --accent-deep: #A55E33;
    --water:       #2F6B73;
    --water-deep:  #1F4F56;
    --rule:        rgba(30,37,40,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;
    background:var(--sand);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-size:16px;
    line-height:1.55;
  }
  .display{font-family:'Italiana',serif;font-weight:400;letter-spacing:.005em}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  /* Image slot styling baseline */
  image-slot{
    background:rgba(30,37,40,.04);
  }
  image-slot::part(frame){
    background:
      repeating-linear-gradient(135deg,
        rgba(30,37,40,.025) 0 14px,
        rgba(30,37,40,0) 14px 28px),
      var(--cream);
  }
  image-slot::part(ring){
    border:1px dashed rgba(30,37,40,.18);
  }

  /* Soft selection */
  ::selection{background:var(--accent);color:var(--cream)}

  /* ── Responsive overrides ──────────────────────────────────────────────
     Inline component styles win normal specificity battles; we use
     !important inside @media so layout collapses cleanly on tablet/mobile
     without rewriting every component.
  */
  @media (max-width: 980px){
    .ll-section{ padding-left:5vw !important; padding-right:5vw !important; }
    .ll-section-py{ padding-top:90px !important; padding-bottom:90px !important; }

    /* Two-column body grids stack */
    .ll-2col{ grid-template-columns:1fr !important; gap:48px !important; }

    /* Editorial hero portrait shrinks */
    .ll-hero-editorial-img{ aspect-ratio: 4 / 3 !important; }

    /* Renderings: 12-col asymmetric → simple 2-col */
    .ll-render-grid{
      grid-template-columns: repeat(2,1fr) !important;
      grid-auto-rows: 220px !important;
    }
    .ll-render-grid > *{
      grid-column: span 1 !important;
      grid-row:    span 1 !important;
    }
    .ll-render-grid > *:first-child{
      grid-column: span 2 !important;
      grid-row:    span 1 !important;
    }

    /* Investor stats 4 → 2 */
    .ll-stats-4{ grid-template-columns: repeat(2,1fr) !important; gap:28px !important; }

    /* Hide nav menu links (CTA stays) */
    .ll-nav-links{ display:none !important; }
  }

  @media (max-width: 640px){
    .ll-section-py{ padding-top:72px !important; padding-bottom:72px !important; }

    /* Postcard hero — 4 stats → 2 */
    .ll-hero-postcard-stats{ grid-template-columns: repeat(2,1fr) !important; }

    /* Renderings → single column */
    .ll-render-grid{
      grid-template-columns: 1fr !important;
      grid-auto-rows: 240px !important;
    }
    .ll-render-grid > *:first-child{ grid-column: span 1 !important; }

    /* Investor → 1 col */
    .ll-stats-4{ grid-template-columns: 1fr !important; }

    /* Form 2-col → 1-col */
    .ll-form-2{ grid-template-columns: 1fr !important; gap:18px !important; }

    /* Nav padding + logo */
    .ll-nav{ padding:14px 5vw !important; }
    .ll-nav-cta-label{ display:none !important; }
    .ll-nav-cta{ padding:10px 14px !important; }

    /* Video player squarer */
    .ll-video-shell{ aspect-ratio: 4 / 3 !important; }

    /* Sales/map: keep stacked */
    .ll-visit-grid{ gap:36px !important; }

    /* Tweaks panel — get out of the way of the CTA on tiny screens */
    .ll-section h2{ text-wrap: balance; }
  }

  @media (max-width: 420px){
    /* Plan rendering panel needs a slightly taller box once sidebar stacks */
    .ll-plan-canvas{ aspect-ratio: 1 / 1 !important; }
    /* Penthouse pill name can wrap */
    .ll-interest-pills button{ font-size: 12px !important; padding: 8px 12px !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/image-slot.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/palettes.js"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/transition-video.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
